<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>スタートページ</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="ページナビゲーション">
        <div class="sidebar-head">
          <button class="sidebar-toggle" id="sidebarToggle" type="button" aria-label="サイドバーを折りたたむ" aria-expanded="true">
            <span aria-hidden="true">☰</span>
          </button>
          <div class="sidebar-clock">
            <time id="sidebarClock" datetime="">--:--:--</time>
            <p id="sidebarDate">読み込み中...</p>
          </div>
        </div>

        <nav class="page-nav" aria-label="ページ切り替え">
          <button class="nav-link is-active" type="button" data-page-target="main" title="メイン画面">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/><path d="M9 21v-7h6v7"/></svg>
            </span>
            <span class="nav-label">メイン画面</span>
          </button>
        </nav>

        <div class="sidebar-footer">
          <button class="settings-button" type="button" data-page-target="settings" title="設定">
            <span class="nav-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z"/><path d="M4.9 15.1 3.5 18l2.5 2.5 2.9-1.4"/><path d="M15.1 19.1l2.9 1.4 2.5-2.5-1.4-2.9"/><path d="M19.1 8.9 20.5 6 18 3.5l-2.9 1.4"/><path d="M8.9 4.9 6 3.5 3.5 6l1.4 2.9"/></svg>
            </span>
            <span class="nav-label">設定</span>
          </button>
        </div>
      </aside>

      <main class="main-content">
        <section class="page is-active" id="page-main" aria-labelledby="mainTitle">
          <h1 id="mainTitle" class="sr-only">メイン画面</h1>

          <section class="main-grid" aria-label="メイン">
            <div class="primary-column">
              <form class="search-panel" id="searchForm" role="search">
                <label class="sr-only" for="searchInput">Google検索</label>
                <div class="search-box">
                  <input id="searchInput" name="q" type="search" autocomplete="off" placeholder="検索したい言葉を入力">
                  <button type="submit">検索</button>
                </div>
              </form>

              <article class="links-card" id="linksCard">
                <div class="card-heading">
                  <div>
                    <p class="eyebrow">ショートカット</p>
                    <h2>ランチボード</h2>
                  </div>
                  <div class="shortcut-actions">
                    <button class="edit-toggle" id="shortcutEditToggle" type="button" aria-pressed="false">編集</button>
                    <button class="add-shortcut-button" id="openShortcutModal" type="button">追加</button>
                  </div>
                </div>

                <div class="link-groups" id="linkGroups"></div>
              </article>
            </div>

            <div class="secondary-column">
            <article class="weather-card">
              <div class="card-heading">
                <div>
                  <p class="eyebrow">天気</p>
                  <h2 id="weatherPlace">東京</h2>
                </div>
                <span id="weatherIcon" class="weather-icon" aria-hidden="true">--</span>
              </div>
              <div class="weather-main">
                <strong id="weatherTemp">--°</strong>
                <span id="weatherSummary">天気を取得中...</span>
                <span id="weatherFeels">体感 --°</span>
                <span id="weatherWind">風 -- km/h</span>
              </div>
              <div class="weekly-weather" id="weeklyWeather">
                <a class="weather-link" href="https://weather.yahoo.co.jp/weather/" target="_blank" rel="noopener">Yahoo!天気</a>
                <div class="weekly-weather-heading">明日から4日間</div>
                <div class="weekly-weather-list" id="weeklyWeatherList">
                  <p class="feed-message">天気を読み込み中...</p>
                </div>
              </div>
            </article>

            <article class="mini-news-card">
              <div class="card-heading">
                <div>
                  <p class="eyebrow">ニュース</p>
                  <h2>ニュースフィード</h2>
                </div>
                <a class="mini-news-link" id="newsSourceLink" href="https://news.google.com/" target="_blank" rel="noopener">開く</a>
              </div>
              <div class="news-tabs" id="newsTabs" role="tablist" aria-label="ニュースカテゴリ"></div>
              <div class="news-list" id="newsList">
                <p class="feed-message">ニュースを読み込み中...</p>
              </div>
            </article>
            </div>
          </section>
        </section>

        <section class="page" id="page-settings" aria-labelledby="settingsTitle" hidden>
          <div class="page-heading">
            <h1 id="settingsTitle" class="sr-only">設定</h1>
          </div>
          <div class="settings-grid">
            <section class="settings-card" aria-label="背景設定">
              <p class="eyebrow">表示</p>
              <h2>背景</h2>
              <label for="backgroundPreset">背景プリセット</label>
              <select id="backgroundPreset">
                <option value="forest">深い緑</option>
                <option value="slate">静かなグレー</option>
                <option value="midnight">夜</option>
                <option value="warm">暖色</option>
              </select>
              <label for="backgroundImageUrl">背景画像URL</label>
              <input id="backgroundImageUrl" type="url" autocomplete="off" placeholder="https://example.com/background.jpg">
              <div class="settings-actions">
                <button id="saveBackgroundSettings" type="button">背景を保存</button>
                <button id="resetBackgroundSettings" type="button">初期状態に戻す</button>
              </div>
              <p class="settings-help">画像URLを空にすると、プリセットの背景だけを使います。</p>
            </section>
            <section class="settings-card" aria-label="ショートカットのエクスポートとインポート">
              <p class="eyebrow">ショートカット</p>
              <h2>バックアップ</h2>
              <div class="settings-actions">
                <button id="exportShortcuts" type="button">エクスポート</button>
                <button id="importShortcuts" type="button">インポート</button>
              </div>
              <input class="sr-only" id="shortcutImportFile" type="file" accept="application/json,.json">
              <p class="settings-help" id="shortcutImportStatus">カテゴリとリンクをJSONで保存・復元できます。</p>
            </section>
          </div>
        </section>
      </main>
    </div>

    <dialog class="shortcut-modal" id="shortcutModal" aria-labelledby="shortcutModalTitle">
      <div class="modal-shell">
        <div class="modal-heading">
          <h2 id="shortcutModalTitle">ショートカットを追加</h2>
          <button class="modal-close" id="closeShortcutModal" type="button" aria-label="閉じる">×</button>
        </div>

        <div class="modal-content">
          <section>
            <p class="eyebrow">リンク</p>
            <form class="shortcut-form" id="shortcutForm">
              <input id="shortcutLabel" type="text" autocomplete="off" placeholder="名前">
              <input id="shortcutUrl" type="text" autocomplete="off" placeholder="URL">
              <select id="shortcutCategory" aria-label="カテゴリ"></select>
              <button type="submit">追加</button>
            </form>
          </section>

          <section>
            <p class="eyebrow">カテゴリ</p>
            <form class="category-form" id="categoryForm">
              <input id="categoryName" type="text" autocomplete="off" placeholder="新しいカテゴリ名">
              <button type="submit">カテゴリ追加</button>
            </form>
            <div class="category-manager" id="categoryManager" aria-label="カテゴリ管理"></div>
          </section>
        </div>
      </div>
    </dialog>

    <script src="app.js?v=20260514-settings-toggle"></script>
  </body>
</html>
